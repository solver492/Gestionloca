kind = "web"
previewPath = "/"
title = "Movia Immo"
version = "1.0.0"
id = "artifacts/movia-immo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21249

[services.development]
run = "pnpm --filter @workspace/movia-immo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/movia-immo", "run", "build" ]
publicDir = "artifacts/movia-immo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21249"
BASE_PATH = "/"
